<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Машина — ARS Auto</title>
<meta name="description" content="Детальная карточка машины с таймлайном восстановительных работ, фото до/после, списком запчастей и именем мастера."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css"/>
</head>
<body data-page="car">

<div id="car-mount" class="section"></div>

<section class="section" style="background:var(--bg-soft); padding-top:60px; padding-bottom:60px;">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:20px; margin-bottom:32px;">
      <div>
        <span class="eyebrow">Похожие машины</span>
        <h2 class="serif" style="margin-top:12px;">Ещё в нашем стоке</h2>
      </div>
      <a href="catalog.html" class="btn btn-ghost">Смотреть все →</a>
    </div>
    <div id="similar-cars"></div>
  </div>
</section>

<script src="assets/cars.js"></script>
<script src="assets/app.js"></script>
<script>
  // Render 3 similar cars (excluding current)
  document.addEventListener('DOMContentLoaded', () => {
    const slug = new URLSearchParams(window.location.search).get('slug');
    const others = window.CARS.filter(c => c.slug !== slug).slice(0, 3);
    const html = `<div class="car-grid" style="grid-template-columns:repeat(3,1fr);">${others.map(renderCarCard).join('')}</div>`;
    document.getElementById('similar-cars').innerHTML = html;
  });
</script>
</body>
</html>
