<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Каталог машин — ARS Auto</title>
<meta name="description" content="Каталог автомобилей с пробегом из Испании. Машины до 5 лет с гарантией 12 месяцев и прозрачной историей. Доставка по всей Испании."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css"/>
</head>
<body data-page="catalog">

<section class="container">
  <div class="catalog-head">
    <span class="eyebrow on-dark">Каталог</span>
    <h1 style="margin-top:16px;">Машины в наличии</h1>
    <p>Все машины — не старше 5 лет, с прозрачной историей и гарантией 12 месяцев. По каждой — VIN-отчёт и подробные фото.</p>
  </div>
  <div class="filters">
    <button class="chip active" onclick="filterCars('')">Все</button>
    <button class="chip" onclick="filterCars('Бензин')">Бензин</button>
    <button class="chip" onclick="filterCars('Дизель')">Дизель</button>
    <button class="chip" onclick="filterCars('Гибрид')">Гибрид</button>
    <button class="chip" onclick="filterCars('Электро')">Электро</button>
  </div>
</section>

<section class="section" style="padding-top:8px;">
  <div class="container">
    <div id="catalog-mount"></div>
  </div>
</section>

<script src="assets/cars.js"></script>
<script src="assets/app.js"></script>
<script>
  function filterCars(filter) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('catalog-mount').innerHTML = renderCatalog(filter);
  }
</script>
</body>
</html>
